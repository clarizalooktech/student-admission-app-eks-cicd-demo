apiVersion: v1
kind: Service
metadata:
  name: eduapply-service
  namespace: default
  labels:
    app: eduapply
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: eduapply
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80

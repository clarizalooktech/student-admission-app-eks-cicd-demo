apiVersion: v1
kind: Service
metadata:
  name: student-admission-app-service
  namespace: default
  labels:
    app: student-admission-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: student-admission-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-admission-app
  namespace: default
  labels:
    app: student-admission-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-admission-app
  template:
    metadata:
      labels:
        app: student-admission-app
    spec:
      containers:
        - name: student-admission-app
          image: IMAGE_PLACEHOLDER   # replaced by GitHub Actions
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

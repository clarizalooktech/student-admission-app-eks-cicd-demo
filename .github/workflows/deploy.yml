name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: student-admission-app
  EKS_CLUSTER_NAME: student-admission-app-cluster

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ──────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Login to Amazon ECR ────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build and push Docker image ────────────────────────────
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          echo "Building image: $IMAGE_URI"
          docker build -t $IMAGE_URI ./app

          echo "Pushing image to ECR..."
          docker push $IMAGE_URI

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      # ── 5. Update kubeconfig for EKS ─────────────────────────────
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      # ── 6. Deploy to EKS ──────────────────────────────────────────
      - name: Deploy to EKS
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          echo "Deploying image: $IMAGE_URI"

          # Replace placeholder with actual image URI
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" infra/k8s/deployment.yaml

          # Apply manifests
          kubectl apply -f infra/k8s/deployment.yaml
          kubectl apply -f infra/k8s/service.yaml

          # Wait for rollout to complete
          kubectl rollout status deployment/student-admission-app --timeout=120s

      # ── 7. Print app URL ──────────────────────────────────────────
      - name: Get Load Balancer URL
        run: |
          echo "Waiting for LoadBalancer external IP..."
          sleep 20
          kubectl get service student-admission-app-service \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          echo ""
          echo "App is live at the URL above!"
